<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌱 Monitoramento Agrícola - Copernicus</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: #0f1a0f; color: #e0f0e0; overflow: hidden; }
        #header {
            position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
            background: linear-gradient(135deg, #0f3d0f, #1a5c1a);
            padding: 12px 20px; display: flex; align-items: center; justify-content: space-between;
            box-shadow: 0 4px 15px rgba(0,0,0,0.6);
        }
        h1 { color: #7cff7c; font-size: 1.2rem; }
        #map { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        .side-controls {
            position: fixed; right: 15px; top: 80px; z-index: 1000;
            display: flex; flex-direction: column; gap: 8px;
        }
        .side-btn {
            width: 50px; height: 50px; background: rgba(15,26,15,0.9);
            border: 2px solid #4ade80; color: #7cff7c; border-radius: 12px;
            font-size: 1.5rem; cursor: pointer; display: flex; align-items: center; justify-content: center;
        }
        #info-ag {
            position: fixed; bottom: 20px; left: 20px; z-index: 1000;
            background: rgba(15, 26, 15, 0.95); border: 2px solid #4ade80;
            border-radius: 12px; padding: 15px; max-width: 320px; font-size: 0.85rem;
        }
        /* Ajuste para o seletor de camadas do Leaflet ficar visível no modo escuro */
        .leaflet-control-layers { background: #1a5c1a !important; color: white !important; border: 2px solid #4ade80 !important; }
    </style>
</head>
<body>

    <div id="header">
        <h1>🌱 Satélite Sentinel-2 (Copernicus)</h1>
        <div style="font-size: 0.8rem; text-align: right;">Imagens Dinâmicas</div>
    </div>

    <div id="map"></div>

    <div class="side-controls">
        <button class="side-btn" onclick="getMyLocation()" title="Minha localização">📍</button>
        <button class="side-btn" onclick="map.zoomIn()">＋</button>
        <button class="side-btn" onclick="map.zoomOut()">－</button>
    </div>

    <div id="info-ag">
        <strong>Como usar:</strong><br>
        • Use o ícone de folhas no canto superior direito para trocar a visão.<br>
        • <strong>NDVI:</strong> Verde escuro = Planta saudável.<br>
        • <strong>Falsa Cor:</strong> Tons de vermelho = Muita biomassa.
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const map = L.map('map', { center: [-15.5, -52], zoom: 6 });

        // 1. Camada Base (Referência Fixa)
        const esri = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
            attribution: '© Esri'
        }).addTo(map);

        // 2. Camadas do Copernicus (Sentinel Hub WMS)
        const baseUrl = 'https://sh.dataspace.copernicus.eu/ogc/wms/0b080447-0e6e-4775-9e67-00c7336f33d5';

        const naturalColor = L.tileLayer.wms(baseUrl, {
            layers: 'NATURAL-COLOR',
            format: 'image/png', transparent: true, attribution: '© Copernicus', maxZoom: 18
        });

        const ndvi = L.tileLayer.wms(baseUrl, {
            layers: 'NDVI',
            format: 'image/png', transparent: true, attribution: '© Copernicus', maxZoom: 18
        });

        const falseColor = L.tileLayer.wms(baseUrl, {
            layers: 'FALSE-COLOR',
            format: 'image/png', transparent: true, attribution: '© Copernicus', maxZoom: 18
        });

        // Adiciona o seletor de camadas
        const overlays = {
            "Satélite Estático (HD)": esri,
            "Sentinel-2 Cor Real": naturalColor,
            "Sentinel-2 NDVI (Saúde)": ndvi,
            "Sentinel-2 Falsa Cor": falseColor
        };

        // Inicia com Cor Natural ativa
        naturalColor.addTo(map);
        L.control.layers(null, overlays, { collapsed: false }).addTo(map);

        function getMyLocation() {
            navigator.geolocation.getCurrentPosition(pos => {
                map.flyTo([pos.coords.latitude, pos.coords.longitude], 14);
                L.marker([pos.coords.latitude, pos.coords.longitude]).addTo(map).bindPopup("Sua Localização").openPopup();
            });
        }

        L.control.scale({ imperial: false }).addTo(map);
    </script>
</body>
</html>

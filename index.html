<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>AgroSystem Pro - João Divino Barbosa</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; font-family: sans-serif; }
        #header { position: fixed; top: 0; width: 100%; height: 50px; background: #0b3b0b; color: #7aff7a; display: flex; align-items: center; justify-content: center; z-index: 1000; border-bottom: 2px solid #7aff7a; font-weight: bold; }
        #map { position: absolute; top: 50px; bottom: 0; width: 100%; z-index: 1; }
        #footer { position: fixed; bottom: 0; width: 100%; background: rgba(0,0,0,0.8); color: #fff; text-align: center; font-size: 10px; padding: 5px; z-index: 1000; }
        .gps-btn { position: fixed; right: 20px; top: 70px; z-index: 1000; width: 50px; height: 50px; border-radius: 50%; background: #2e7d32; border: 2px solid #fff; color: white; font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>

<div id="header">AGRO MONITOR - VISÃO DIRETA</div>
<div id="map"></div>
<button class="gps-btn" onclick="map.locate({setView: true, maxZoom: 17})">🎯</button>
<div id="footer">Desenvolvido por João Divino Barbosa</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    const map = L.map('map', { zoomControl: false }).setView([-17.79, -50.92], 13);

    // PROVEDOR ESRI - ALTA DISPONIBILIDADE (Não cai e não pede chave)
    L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
        maxZoom: 19,
        attribution: 'Esri'
    }).addTo(map);

    map.on('locationfound', (e) => {
        L.marker(e.latlng).addTo(map).bindPopup("Você está aqui").openPopup();
    });

    map.locate({setView: true, maxZoom: 16});
</script>
</body>
</html>

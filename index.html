<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Monitoramento Agrícola</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        body { background: #0f1a0f; overflow: hidden; height: 100vh; }
        
        #header {
            position: fixed; top: 0; left: 0; right: 0; z-index: 2000;
            background: #0f3d0f; padding: 10px; height: 50px;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.5);
        }
        h1 { color: #7cff7c; font-size: 1rem; }
        
        #map { position: absolute; top: 50px; bottom: 0; left: 0; right: 0; z-index: 1; }
        
        /* BOTÕES NA ESQUERDA PARA NÃO ATRAPALHAR O MENU */
        .side-controls {
            position: fixed; left: 10px; top: 70px; z-index: 1500;
            display: flex; flex-direction: column; gap: 10px;
        }
        .side-btn {
            width: 50px; height: 50px; background: #1a5c1a;
            border: 2px solid #4ade80; color: white; border-radius: 10px;
            font-size: 1.5rem; cursor: pointer; display: flex; align-items: center; justify-content: center;
        }
        
        /* CORREÇÃO DEFINITIVA DO MENU DE CAMADAS (DIREITA) */
        .leaflet-control-layers {
            margin-top: 20px !important;
            margin-right: 10px !important;
            background: rgba(15, 61, 15, 0.95) !important;
            color: white !important;
            border: 2px solid #4ade80 !important;
            font-size: 14px !important;
            max-width: 200px !important;
        }
        .leaflet-control-layers-list { padding: 10px; }
        .leaflet-control-layers label { margin-bottom: 10px; display: block; }

        #info-box {
            position: fixed; bottom: 10px; left: 10px; right: 10px; z-index: 1500;
            background: rgba(0,0,0,0.8); color: white; padding: 8px;
            border-radius: 5px; font-size: 0.7rem; text-align: center;
            border: 1px solid #4ade80;
        }
    </style>
</head>
<body>

    <div id="header">
        <h1>🌱 Satélite Sentinela-2</h1>
    </div>

    <div id="map"></div>

    <div class="side-controls">
        <button class="side-btn" onclick="getMyLocation()">📍</button>
        <button class="side-btn" onclick="map.zoomIn()">+</button>
        <button class="side-btn" onclick="map.zoomOut()">-</button>
    </div>

    <div id="info-box">
        Selecione o mapa no menu à direita. NDVI mostra a saúde da planta.
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // Mapa focado no Brasil
        const map = L.map('map', { zoomControl: false }).setView([-15.5, -52], 5);

        // Camadas
        const esri = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
            attribution: 'Esri'
        }).addTo(map);

        const baseUrl = 'https://sh.dataspace.copernicus.eu/ogc/wms/0b080447-0e6e-4775-9e67-00c7336f33d5';

        const natural = L.tileLayer.wms(baseUrl, {
            layers: 'NATURAL-COLOR', format: 'image/png', transparent: true
        }).addTo(map);

        const ndvi = L.tileLayer.wms(baseUrl, {
            layers: 'NDVI', format: 'image/png', transparent: true
        });

        const falseColor = L.tileLayer.wms(baseUrl, {
            layers: 'FALSE-COLOR', format: 'image/png', transparent: true
        });

        // Configuração do Seletor - 'collapsed: false' para já vir aberto e pronto pro toque
        const baseMaps = { "Satélite HD": esri };
        const overlays = { 
            "Cor Real": natural, 
            "NDVI (Saúde)": ndvi, 
            "Falsa Cor": falseColor 
        };

        L.control.layers(baseMaps, overlays, { 
            collapsed: false, 
            position: 'topright' 
        }).addTo(map);

        function getMyLocation() {
            navigator.geolocation.getCurrentPosition(pos => {
                const lat = pos.coords.latitude;
                const lng = pos.coords.longitude;
                map.flyTo([lat, lng], 15);
                L.marker([lat, lng]).addTo(map).bindPopup("Sua Área").openPopup();
            }, () => alert("Ative o GPS do celular."));
        }
    </script>
</body>
</html>

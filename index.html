<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">

<title>AgroSystem PRO MAX</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet-draw@1.0.4/dist/leaflet.draw.css"/>

<style>
body { margin:0; font-family:sans-serif; background:#000; }

#map { position:absolute; top:50px; bottom:0; width:100%; }

#top {
    position:fixed;
    top:0;
    width:100%;
    height:50px;
    background:#002b00;
    color:#00ff88;
    display:flex;
    align-items:center;
    justify-content:center;
    z-index:1000;
    font-weight:bold;
}

.panel {
    position:fixed;
    left:10px;
    bottom:70px;
    background:#000;
    color:#00ff88;
    padding:10px;
    border:1px solid #00ff88;
    z-index:1000;
    font-size:13px;
}

.btn {
    position:fixed;
    right:15px;
    width:55px;
    height:55px;
    border-radius:50%;
    background:#2e7d32;
    color:#fff;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:20px;
    z-index:1000;
}

#gpsBtn { top:70px; }
#clearBtn { top:140px; }

#footer {
    position:fixed;
    bottom:0;
    width:100%;
    background:#000;
    color:#fff;
    text-align:center;
    font-size:10px;
    padding:5px;
    z-index:1000;
}
</style>
</head>

<body>

<div id="top">AGROSYSTEM PRO MAX</div>
<div id="map"></div>

<div class="panel" id="info">
Área: 0 ha<br>Status: pronto
</div>

<div class="btn" id="gpsBtn" onclick="localizar()">📍</div>
<div class="btn" id="clearBtn" onclick="limpar()">🗑️</div>

<div id="footer">Desenvolvido por João Divino Barbosa</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-draw@1.0.4/dist/leaflet.draw.js"></script>

<script>
// MAPA
const map = L.map('map').setView([-17.79, -50.92], 13);

// SATÉLITE
L.tileLayer(
'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
{ maxZoom:19 }
).addTo(map);

// CAMADA DESENHO
const drawnItems = new L.FeatureGroup();
map.addLayer(drawnItems);

// CONTROLE DESENHO
const drawControl = new L.Control.Draw({
    draw: {
        polygon:true,
        rectangle:true,
        polyline:false,
        circle:false,
        marker:false
    },
    edit: { featureGroup: drawnItems }
});
map.addControl(drawControl);

// FUNÇÃO ÁREA (CORRIGIDA)
function calcular(layer){
    const latlngs = layer.getLatLngs()[0];

    // cálculo manual confiável
    let area = 0;
    for (let i = 0; i < latlngs.length; i++) {
        let p1 = latlngs[i];
        let p2 = latlngs[(i + 1) % latlngs.length];
        area += (p2.lng - p1.lng) * (p2.lat + p1.lat);
    }
    area = Math.abs(area * 111319 * 111319 / 2);

    let ha = area / 10000;

    document.getElementById("info").innerHTML =
        "Área: " + ha.toFixed(2) + " ha<br>Status: medido";
}

// EVENTOS
map.on(L.Draw.Event.CREATED, function (e) {
    drawnItems.clearLayers();
    drawnItems.addLayer(e.layer);
    calcular(e.layer);
});

map.on(L.Draw.Event.EDITED, function (e) {
    e.layers.eachLayer(function(layer){
        calcular(layer);
    });
});

// GPS
let marker;

function localizar(){
    map.locate({
        setView:true,
        maxZoom:18,
        enableHighAccuracy:true
    });
}

map.on('locationfound', function(e){
    if(marker) map.removeLayer(marker);

    marker = L.marker(e.latlng).addTo(map)
        .bindPopup("Você está aqui")
        .openPopup();
});

map.on('locationerror', function(){
    alert("Ative o GPS");
});

// LIMPAR
function limpar(){
    drawnItems.clearLayers();
    document.getElementById("info").innerHTML =
        "Área: 0 ha<br>Status: limpo";
}

// AUTO
localizar();

</script>

</body>
</html>
